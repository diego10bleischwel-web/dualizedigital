<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Financeiro PRO</title>

<style>
:root{
  --bg:#f5f2ee;
  --card:#ffffff;
  --text:#2f2f2f;
  --muted:#8a837c;
  --line:#e7e1db;
  --primary:#2f2f2f;
  --accent:#815d46;

  --green:#e3f6ea;
  --green-text:#1f7a46;
  --yellow:#fff4d6;
  --yellow-text:#9c6b00;
  --red:#ffe4e2;
  --red-text:#b42318;
}

*{box-sizing:border-box;font-family:Inter,Arial}
body{margin:0;background:var(--bg);color:var(--text)}

.container{max-width:1300px;margin:auto;padding:30px}

h1{font-size:42px;margin-bottom:20px}

.dashboard{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  margin-bottom:25px;
}

.card{
  background:var(--card);
  padding:18px;
  border-radius:16px;
  border:1px solid var(--line);
}

.card span{font-size:13px;color:var(--muted)}
.card strong{font-size:22px;display:block;margin-top:5px}

.main{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.table-card{padding:20px}

.table-card h2{margin-bottom:15px}

.table-wrapper{
  max-height:500px;
  overflow:auto;
}

table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid var(--line)}
th{font-size:12px;color:var(--muted)}

tr{transition:0.2s}

.status-btns{
  display:flex;
  gap:5px;
}

.status-btn{
  border:none;
  padding:6px 10px;
  border-radius:20px;
  font-weight:700;
  cursor:pointer;
  opacity:0.5;
}

.status-btn.active{opacity:1}

.pago{background:var(--green);color:var(--green-text)}
.pendente{background:var(--yellow);color:var(--yellow-text)}
.nao{background:var(--red);color:var(--red-text)}

input{padding:8px;border-radius:8px;border:1px solid var(--line)}

.side-card{padding:20px}

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Painel Financeiro</h1>

<div class="dashboard">
  <div class="card"><span>Saldo</span><strong>R$ 3.420</strong></div>
  <div class="card"><span>Pago</span><strong>R$ 1.285</strong></div>
  <div class="card"><span>Pendente</span><strong>R$ 820</strong></div>
  <div class="card"><span>Não pago</span><strong>R$ 450</strong></div>
  <div class="card"><span>Sobra</span><strong>R$ 865</strong></div>
</div>

<div class="main">

<div class="card table-card">
<h2>Contas do mês</h2>

<div class="table-wrapper">
<table id="tabela">
<thead>
<tr>
<th>Conta</th>
<th>Valor</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr draggable="true">
<td>Aluguel</td>
<td><input value="1200"></td>
<td>
<div class="status-btns">
<button class="status-btn pago active">Pago</button>
<button class="status-btn pendente">Pendente</button>
<button class="status-btn nao">Não</button>
</div>
</td>
</tr>
<tr draggable="true">
<td>Energia</td>
<td><input value="280"></td>
<td>
<div class="status-btns">
<button class="status-btn pago">Pago</button>
<button class="status-btn pendente active">Pendente</button>
<button class="status-btn nao">Não</button>
</div>
</td>
</tr>
</tbody>
</table>
</div>
</div>

<div class="card side-card">
<h2>Lançamento rápido</h2>
<input placeholder="Descrição"><br><br>
<input placeholder="Valor"><br><br>
<button>Adicionar</button>
</div>

</div>

</div>

<script>

// STATUS CLICK

document.querySelectorAll(".status-btns").forEach(group=>{
  group.querySelectorAll("button").forEach(btn=>{
    btn.addEventListener("click",()=>{
      group.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
    })
  })
})

// DRAG ROWS

let dragged;

document.querySelectorAll("tr").forEach(row=>{
  row.addEventListener("dragstart",()=>dragged=row)
  row.addEventListener("dragover",e=>e.preventDefault())
  row.addEventListener("drop",()=>{
    row.parentNode.insertBefore(dragged,row)
  })
})

</script>

</body>
</html>
